version: '3.8'

# ==============================
# AI智能求职辅导平台 Docker Compose
# 一键启动：docker-compose up -d
# ==============================

services:
  mysql:
    image: mysql:8.0
    container_name: career-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root}
      MYSQL_DATABASE: career_platform
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - career-network

  redis:
    image: redis:7-alpine
    container_name: career-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - career-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-career-platform-secret-key-2026}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-sk-xxx}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - career-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: career-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - career-network

volumes:
  mysql-data:
  redis-data:
  uploads-data:

networks:
  career-network:
    driver: bridge
